<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Third Eye">
  <title>Third Eye</title>
  <defs>
    <radialGradient id="te-iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fecaca"/>
      <stop offset="25%" stop-color="#f87171"/>
      <stop offset="60%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <linearGradient id="te-rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c026d3"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <radialGradient id="te-pupil" cx="45%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1a0a1f"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>

  <!-- 外晕 -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#te-rim)" stroke-width="0.5" opacity="0.35"/>

  <!-- 放射状神经/血管线 -->
  <g stroke="#9f1239" stroke-width="0.6" stroke-linecap="round" opacity="0.55" fill="none">
    <path d="M50 8 Q 48 14 50 20"/>
    <path d="M50 92 Q 52 86 50 80"/>
    <path d="M8 50 Q 14 52 20 50"/>
    <path d="M92 50 Q 86 48 80 50"/>
    <path d="M20 20 Q 26 26 30 30"/>
    <path d="M80 80 Q 74 74 70 70"/>
    <path d="M20 80 Q 26 74 30 70"/>
    <path d="M80 20 Q 74 26 70 30"/>
  </g>

  <!-- 红色完整圆形（主体虹膜） -->
  <circle cx="50" cy="50" r="34" fill="url(#te-iris)"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#fca5a5" stroke-width="0.6" opacity="0.7"/>

  <!-- 眼白 -->
  <ellipse cx="50" cy="50" rx="22" ry="14" fill="#fff5f5"/>
  <path d="M 28 50 Q 50 34, 72 50" fill="none" stroke="#7f1d1d" stroke-width="1.2" opacity="0.85"/>
  <path d="M 28 50 Q 50 66, 72 50" fill="none" stroke="#7f1d1d" stroke-width="1.2" opacity="0.85"/>

  <!-- 内层虹膜 -->
  <circle cx="50" cy="50" r="9" fill="url(#te-iris)"/>

  <!-- 瞳孔 -->
  <circle cx="50" cy="50" r="4" fill="url(#te-pupil)"/>

  <!-- 高光 -->
  <circle cx="47.5" cy="47.5" r="1.6" fill="#ffffff" opacity="0.95"/>
  <circle cx="52" cy="51.5" r="0.7" fill="#ffffff" opacity="0.6"/>
</svg>
